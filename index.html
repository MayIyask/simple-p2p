<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RPS P2P</title>
</head>
<body>
<h2>石头剪刀布 P2P</h2>

<button onclick="create()">创建房间</button>
<button onclick="join()">加入房间</button>

<p>本地信息：</p>
<textarea id="local" rows="6" cols="60"></textarea>

<p>远程信息：</p>
<textarea id="remote" rows="6" cols="60"></textarea>
<button onclick="connect()">连接</button>

<hr>

<button onclick="sendMove('rock')">石头</button>
<button onclick="sendMove('scissors')">剪刀</button>
<button onclick="sendMove('paper')">布</button>

<h3 id="status"></h3>

<script>
let pc = new RTCPeerConnection({
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
});
let channel;

function create() {
  channel = pc.createDataChannel("game");
  setupChannel();

  pc.onicecandidate = e => {
    if (!e.candidate) {
      local.value = JSON.stringify(pc.localDescription);
    }
  };

  pc.createOffer()
    .then(o => pc.setLocalDescription(o));
}

function join() {
  pc.ondatachannel = e => {
    channel = e.channel;
    setupChannel();
  };

  pc.onicecandidate = e => {
    if (!e.candidate) {
      local.value = JSON.stringify(pc.localDescription);
    }
  };
}

function connect() {
  let data = JSON.parse(remote.value);

  pc.setRemoteDescription(data).then(() => {
    if (data.type === "offer") {
      pc.createAnswer().then(a => pc.setLocalDescription(a));
    }
  });
}

function setupChannel() {
  channel.onmessage = e => {
    let opponent = e.data;
    let me = window.myMove;

    if (me) {
      showResult(me, opponent);
    }
  };
}

function sendMove(move) {
  window.myMove = move;
  channel.send(move);
}

function showResult(a, b) {
  let result = "平局";
  if (
    (a==="rock" && b==="scissors") ||
    (a==="scissors" && b==="paper") ||
    (a==="paper" && b==="rock")
  ) result = "你赢了";

  if (a !== b && result !== "你赢了") result = "你输了";

  status.innerText = `你:${a} 对手:${b} → ${result}`;
}
</script>
</body>
</html>
