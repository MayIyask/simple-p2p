<!DOCTYPE html>
<html>
<body>

<input id="msg">
<button onclick="send()">send</button>

<div id="log"></div>

<script>
const ws = new WebSocket("wss://mininet-vm.taildb667f.ts.net");

ws.onopen = () => log("connected");

ws.onmessage = (e) => log("recv: " + e.data);

function send() {
  ws.send(document.getElementById("msg").value);
}

function log(t) {
  document.getElementById("log").innerHTML += "<div>" + t + "</div>";
}
</script>

</body>
</html>
