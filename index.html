<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>

<input id="room" placeholder="room">
<button onclick="join()">join</button>

<input id="msg">
<button onclick="send()">send</button>

<div id="log"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io("https://mininet-vm.taildb667f.ts.net", {
  transports: ["polling"],
  path: "/socket.io"
});

socket.on("connect", () => {
  log("connected: " + socket.id);
});

socket.on("msg", (m) => log("recv: " + m));

function join() {
  socket.emit("joinRoom", document.getElementById("room").value);
}

function send() {
  socket.emit("msg", document.getElementById("msg").value);
}

function log(t) {
  document.getElementById("log").innerHTML += "<div>" + t + "</div>";
}
</script>

</body>
</html>
