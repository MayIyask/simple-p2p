<!DOCTYPE html>
<html>
<body>
    <h2>发送消息到虚拟机</h2>
    <input type="text" id="msgInput" placeholder="输入内容...">
    <button onclick="sendMessage()">发送</button>

    <script>
        async function sendMessage() {
            const msg = document.getElementById('msgInput').value;
            
            // 关键点：使用 Tailscale 提供的 HTTPS 域名，后面加上你在 Flask 定义的路由 /send
            const serverUrl = 'https://mininet-vm.taildb667f.ts.net/send';
        
            try {
                const response = await fetch(serverUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ msg: msg })
                });
                
                const resData = await response.json();
                console.log('成功:', resData);
                alert('发送成功！服务器收到：' + resData.received);
            } catch (error) {
                console.error('发送失败:', error);
                alert('发送失败，请检查控制台 Error');
            }
        }
    </script>
</body>
</html>
