<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>石头剪刀布 - 房间版</title>
<style>
body { font-family: Arial; text-align: center; margin-top: 40px; }
button { margin: 5px; padding: 10px 20px; }
input { width: 200px; padding: 5px; }
</style>
</head>
<body>

<h2>🎮 石头剪刀布（房间系统）</h2>

<p>你的房间号：</p>
<h3 id="myRoom">未创建</h3>

<button onclick="createRoom()">创建房间</button>

<hr>

<p>加入房间：</p>
<input id="roomInput" placeholder="输入房间号">
<button onclick="joinRoom()">加入房间</button>

<h3 id="status">未连接</h3>
<h4 id="people"></h4>

<hr>

<button onclick="play('rock')">石头</button>
<button onclick="play('scissors')">剪刀</button>
<button onclick="play('paper')">布</button>

<h3 id="result"></h3>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io("http://100.88.34.8:3000");

let room = null;
let myMove = null;
let opponentMove = null;

// 创建房间
function createRoom() {
  room = Math.floor(Math.random() * 9000 + 1000).toString();

  document.getElementById("myRoom").innerText = room;
  document.getElementById("status").innerText = "房间已创建，等待玩家加入...";

  socket.emit("joinRoom", room);
}

// 加入房间
function joinRoom() {
  room = document.getElementById("roomInput").value;

  if (!room) return alert("请输入房间号");

  socket.emit("joinRoom", room);
}

// 成功加入
socket.on("joined", r => {
  room = r;
  document.getElementById("status").innerText = "已加入房间：" + r;
});

// 房间人数
socket.on("roomUpdate", num => {
  document.getElementById("people").innerText = "房间人数：" + num;
});

// 房间满
socket.on("roomFull", () => {
  alert("房间已满（最多2人）");
});

// 接收对手动作
socket.on("opponentMove", move => {
  opponentMove = move;
  checkResult();
});

// 出拳
function play(move) {
  if (!room) {
    alert("请先创建或加入房间！");
    return;
  }

  myMove = move;

  socket.emit("move", {
    room: room,
    move: move
  });

  checkResult();
}

// 判断胜负
function checkResult() {
  if (!myMove || !opponentMove) return;

  let result = "平局";

  if (
    (myMove === "rock" && opponentMove === "scissors") ||
    (myMove === "scissors" && opponentMove === "paper") ||
    (myMove === "paper" && opponentMove === "rock")
  ) {
    result = "你赢了 🎉";
  } else if (myMove !== opponentMove) {
    result = "你输了 😢";
  }

  document.getElementById("result").innerText =
    `你:${myMove} 对手:${opponentMove} → ${result}`;

  myMove = null;
  opponentMove = null;
}
</script>

</body>
</html>
