<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>连接测试</title>
</head>
<body>

<h3>Socket 连接测试</h3>

<input id="room" placeholder="room id">
<button onclick="join()">加入房间</button>

<br><br>

<input id="msg" placeholder="message">
<button onclick="send()">发送</button>

<h4>输出：</h4>
<div id="log"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
let socket;

// 1️⃣ 只做连接
socket = io("https://mininet-vm.taildb667f.ts.net", {
  transports: ["polling"],
  path: "/socket.io"
});


// 连接成功
socket.on("connect", () => {
  log("✔ connected: " + socket.id);
});

// 收消息
socket.on("msg", (data) => {
  log("📩 " + data);
});

// 加入房间
function join() {
  const room = document.getElementById("room").value;
  socket.emit("joinRoom", room);
  log("join room: " + room);
}

// 发消息
function send() {
  const msg = document.getElementById("msg").value;
  socket.emit("msg", msg);
  log("send: " + msg);
}

// 打印
function log(text) {
  document.getElementById("log").innerHTML += "<div>" + text + "</div>";
}
</script>

</body>
</html>
