name: CS2_Data_Auto_Update

# 触发条件
on:
  schedule:
    - cron: '0 4 * * *'  # 每天 UTC 4:00 (北京时间中午 12:00)
  workflow_dispatch:      # 允许你在网页上手动点击按钮运行

jobs:
  build:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 系统
    steps:
      - name: 检出代码
        uses: actions/checkout@v3 # 把你的代码下载到这台虚拟电脑上

      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖包
        run: pip install requests # 如果你的脚本用了 BeautifulSoup，这里也要加

      - name: 运行爬虫脚本
        run: python scrape_players.py

      - name: 将更新后的数据存回仓库
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add players.json
          git commit -m "Auto-update player data: $(date)" || exit 0
          git push
