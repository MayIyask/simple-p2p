<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>P2P 石头剪刀布</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
body { font-family: Arial; text-align: center; }
button { margin: 5px; padding: 10px 20px; }
</style>
</head>
<body>

<h2>🎮 P2P 石头剪刀布</h2>

<p>你的ID：</p>
<input id="myid" readonly style="width:300px">

<p>连接对方：</p>
<input id="target" placeholder="输入对方ID">
<button onclick="connectPeer()">连接</button>

<h3 id="status">未连接</h3>

<hr>

<button onclick="play('rock')">石头</button>
<button onclick="play('scissors')">剪刀</button>
<button onclick="play('paper')">布</button>

<h3 id="result"></h3>

<script>
let peer = new Peer();
let conn;
let myMove = null;
let opponentMove = null;

// 获取自己的ID
peer.on('open', id => {
  document.getElementById('myid').value = id;
});

// 接收连接
peer.on('connection', connection => {
  conn = connection;
  setupConn();
});

// 主动连接
function connectPeer() {
  let target = document.getElementById('target').value;
  conn = peer.connect(target);
  setupConn();
}

// 设置连接事件
function setupConn() {
  conn.on('open', () => {
    document.getElementById('status').innerText = "已连接 ✅";
  });

  conn.on('data', data => {
    if (data.type === "move") {
      opponentMove = data.value;
      checkResult();
    }
  });
}

// 出拳
function play(move) {
  if (!conn || conn.open !== true) {
    alert("还没连接！");
    return;
  }

  myMove = move;
  conn.send({ type: "move", value: move });

  checkResult();
}

// 判断胜负
function checkResult() {
  if (!myMove || !opponentMove) return;

  let res = "平局";
  if (
    (myMove === "rock" && opponentMove === "scissors") ||
    (myMove === "scissors" && opponentMove === "paper") ||
    (myMove === "paper" && opponentMove === "rock")
  ) res = "你赢了 🎉";

  if (myMove !== opponentMove && res !== "你赢了 🎉") {
    res = "你输了 😢";
  }

  document.getElementById('result').innerText =
    `你:${myMove} | 对手:${opponentMove} → ${res}`;

  // 重置
  myMove = null;
  opponentMove = null;
}
</script>

</body>
</html>
