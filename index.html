<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>石头剪刀布联机</title>
</head>
<body>

<h2>房间</h2>
<input id="room" placeholder="输入房间ID">
<button onclick="join()">加入/创建房间</button>

<h2>出拳</h2>
<button onclick="play('rock')">石头</button>
<button onclick="play('paper')">布</button>
<button onclick="play('scissors')">剪刀</button>

<h2>状态</h2>
<div id="status"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
let socket;
let currentRoom;

function connect() {
  // ⚠️ 改成你的 Ubuntu IP
  socket = io("http://100.88.34.8:3000");

  socket.on("roomUpdate", (players) => {
    document.getElementById("status").innerText =
      "房间人数: " + players.length;
  });

  socket.on("result", (data) => {
    document.getElementById("status").innerText =
      `你: ${data.p1} 对手: ${data.p2} => ${data.result}`;
  });
}

function join() {
  const room = document.getElementById("room").value;
  currentRoom = room;

  socket.emit("joinRoom", room);
  document.getElementById("status").innerText = "已加入房间 " + room;
}

function play(choice) {
  socket.emit("play", {
    roomId: currentRoom,
    choice
  });
}

connect();
</script>

</body>
</html>
