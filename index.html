<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CS2 Pro Player Guess</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #1b2838; color: white; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(6, 100px); gap: 5px; margin-top: 20px; }
        .cell { padding: 10px; text-align: center; border-radius: 4px; font-size: 0.8em; font-weight: bold; overflow: hidden;}
        .green { background: #4caf50; }
        .yellow { background: #ffeb3b; color: black; }
        .red { background: #f44336; }
        .suggestion { background: #2a475e; border: 1px solid #66c0f4; position: absolute; width: 200px; z-index: 10; }
        .suggestion div { padding: 8px; cursor: pointer; }
        .suggestion div:hover { background: #66c0f4; }
        input { padding: 10px; width: 200px; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>CS2 选手猜猜乐</h1>
    <div id="login">
        <input type="text" id="uname" placeholder="你的名字">
        <button onclick="createRoom()">新建房间</button>
        <input type="text" id="rid" placeholder="房号" style="width:60px">
        <button onclick="joinRoom()">加入</button>
    </div>

    <div id="game" class="hidden" style="display:none">
        <h3>房间: <span id="roomNum"></span></h3>
        <div style="position: relative;">
            <input type="text" id="search" placeholder="输入选手名..." oninput="showSuggestions(this.value)">
            <div id="suggestions" class="suggestion"></div>
        </div>
        <div class="grid" id="historyHeader">
            <div class="cell">名字</div><div class="cell">队伍</div><div class="cell">国籍</div>
            <div class="cell">年龄</div><div class="cell">身份</div><div class="cell">Majors</div>
        </div>
        <div id="history"></div>
    </div>

    <script>
        const baseUrl = 'https://mininet-vm.taildb667f.ts.net';
        let myName, myRoom, allPlayerNames = [];

        async function createRoom() {
            const res = await fetch(`${baseUrl}/create_room`, {method:'POST'});
            const data = await res.json();
            enterGame(data.room);
        }

        async function joinRoom() {
            const r = document.getElementById('rid').value;
            myName = document.getElementById('uname').value || "玩家";
            await fetch(`${baseUrl}/join_room`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({room: r, user: myName})
            });
            enterGame(r);
        }

        async function enterGame(r) {
            myRoom = r;
            myName = document.getElementById('uname').value || "玩家";
            document.getElementById('login').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            document.getElementById('roomNum').innerText = r;
            
            // 获取全名列表用于搜索建议
            const res = await fetch(`${baseUrl}/get_players`);
            allPlayerNames = await res.json();
        }

        function showSuggestions(val) {
            const div = document.getElementById('suggestions');
            div.innerHTML = '';
            if(!val) return;
            const matches = allPlayerNames.filter(n => n.toLowerCase().startsWith(val.toLowerCase())).slice(0, 5);
            matches.forEach(m => {
                const item = document.createElement('div');
                item.innerText = m;
                item.onclick = () => { document.getElementById('search').value = m; div.innerHTML = ''; submitGuess(m); };
                div.appendChild(item);
            });
        }

        async function submitGuess(name) {
            const res = await fetch(`${baseUrl}/guess`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({room: myRoom, user: myName, guess: name})
            });
            const data = await res.json();
            if(!res.ok) return alert(data.msg);
            addHistoryRow(data);
            document.getElementById('search').value = '';
        }

        function addHistoryRow(data) {
            const h = document.getElementById('history');
            const row = document.createElement('div');
            row.className = 'grid';
            const cols = ['name', 'team', 'cont', 'age', 'role', 'majors'];
            const rawMap = { 'cont': 'country', 'role': 'role', 'age': 'age', 'majors': 'majors', 'team': 'team', 'name': 'name'};
            
            cols.forEach(col => {
                const c = document.createElement('div');
                c.className = `cell ${data.check[col]}`;
                c.innerText = data.raw[rawMap[col] || col];
                row.appendChild(c);
            });
            h.prepend(row);
            if(data.check.name === 'green') alert("🎉 猜对了！你是真正的 CSGO 大师！");
        }
    </script>
</body>
</html>
